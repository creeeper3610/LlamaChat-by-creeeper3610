<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Llama-3.2 On-Device Chat</title>
  <!-- WebLLMの読み込み (CDN経由) -->
  <script type="module">
    import * as webllm from "https://esm.run";
    window.webllm = webllm;
  </script>
  <style>
    /* CSSによるデザイン（軽さを維持しつつ、色と影でSF風に） */
    :root {
      --bg-color: #0d0f12;
      --panel-color: #161a22;
      --accent-color: #00ffcc;
      --accent-glow: rgba(0, 255, 204, 0.3);
      --text-main: #e2e8f0;
      --text-muted: #718096;
      --chat-user: #1a2333;
      --chat-ai: #222936;
      --border-color: #2d3748;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 90vw;
      max-width: 800px;
      height: 85vh;
      background: var(--panel-color);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 1px var(--accent-color);
    }

    /* ヘッダーエリア */
    header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-main);
      text-transform: uppercase;
    }
    h1 span {
      color: var(--accent-color);
      text-shadow: 0 0 8px var(--accent-glow);
    }

    /* ステータスバッジ */
    .status-badge {
      font-size: 0.75rem;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4a4a;
    }
    .status-dot.ready {
      background: var(--accent-color);
      box-shadow: 0 0 8px var(--accent-color);
    }

    /* チャット表示エリア */
    .chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* メッセージの共通デザイン */
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.95rem;
      word-break: break-all;
    }
    .message.user {
      align-self: flex-end;
      background: var(--chat-user);
      border-bottom-right-radius: 2px;
      border: 1px solid rgba(0, 255, 204, 0.1);
    }
    .message.ai {
      align-self: flex-start;
      background: var(--chat-ai);
      border-bottom-left-radius: 2px;
      border: 1px solid var(--border-color);
    }
    .message.system {
      align-self: center;
      background: transparent;
      color: var(--accent-color);
      font-size: 0.8rem;
      border: none;
      text-align: center;
      max-width: 100%;
    }

    /* 入力エリア */
    .input-area {
      padding: 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 12px;
      background: rgba(0, 0, 0, 0.1);
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
    }

    input[type="text"] {
      flex: 1;
      background: #090b0e;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 14px 20px;
      border-radius: 30px;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }
    input[type="text"]:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.15);
    }
    input[type="text"]:disabled {
      color: var(--text-muted);
      cursor: not-allowed;
    }

    button {
      background: var(--accent-color);
      color: #000;
      border: none;
      padding: 0 24px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 10px var(--accent-glow);
    }
    button:hover:not(:disabled) {
      background: #00e6b8;
      box-shadow: 0 0 15px var(--accent-color);
      transform: translateY(-1px);
    }
    button:active:not(:disabled) {
      transform: translateY(0);
    }
    button:disabled {
      background: var(--border-color);
      color: var(--text-muted);
      box-shadow: none;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>🤖 Local<span>Llama</span></h1>
      <div class="status-badge">
        <div id="statusDot" class="status-dot"></div>
        <span id="statusText">初期化中...</span>
      </div>
    </header>

    <div class="chat-box" id="chatBox">
      <div class="message system" id="progressMsg">システムを準備しています... しばらくお待ちください。</div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="AIにメッセージを送信..." disabled>
      <button id="sendBtn" disabled>送信</button>
    </div>
  </div>

  <script type="module">
    // 超軽量設計のLlama-3.2-1Bモデルを指定
    const SELECTED_MODEL = "Llama-3.2-1B-Instruct-q4f16_1";
    
    // 前回の軽さ戦略に基づき、コンテキストウィンドウ（記憶容量）を1024トークンに制限してGPUを節約
    const ENGINE_CONFIG = {
      context_window_size: 1024
    };

    let engine = null;
    const chatHistory = [];

    const chatBox = document.getElementById("chatBox");
    const progressMsg = document.getElementById("progressMsg");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");

    // 初期化とモデルロード
    async function initAI() {
      try {
        if (!navigator.gpu) {
          progressMsg.innerText = "エラー: お使いのブラウザはWebGPUに対応していません。ChromeかEdgeの最新版をお使いください。";
          return;
        }

        // WebLLMエンジンの作成 (進捗コールバックを設定)
        engine = await window.webllm.CreateEngine(SELECTED_MODEL, {
          appConfig: ENGINE_CONFIG,
          initProgressCallback: (report) => {
            progressMsg.innerText = `モデルを読み込み中... (${report.text})`;
          }
        });

        // 読み込み完了時のUI変更
        progressMsg.style.display = "none";
        statusDot.classList.add("ready");
        statusText.innerText = "オンライン (ローカル)";
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.placeholder = "メッセージを入力...";
        appendMessage("system", "Llama-3.2とのローカル接続が完了しました。端末内ですべて処理されます。");

      } catch (error) {
        console.error(error);
        progressMsg.innerText = "初期化中にエラーが発生しました。コンソールを確認してください。";
      }
    }

    // チャット画面へのメッセージ追加
    function appendMessage(sender, text) {
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message", sender);
      msgDiv.innerText = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msgDiv;
    }

    // 送信処理
    async function handleSend() {
      const text = userInput.value.trim();
      if (!text || sendBtn.disabled) return;

      // 入力の無効化とユーザー発言の追加
      userInput.value = "";
      userInput.disabled = true;
      sendBtn.disabled = true;
      appendMessage("user", text);

      // 記憶の管理（コンテキスト制限を破らないための簡易履歴保存）
      chatHistory.push({ role: "user", content: text });

      // AI応答用の空の吹き出しを先に作る
      const aiMessageDiv = appendMessage("ai", "⚡ 思考中...");

      try {
        // ストリーミング形式で文字を順次出力
        const completion = await engine.chat.completions.create({
          messages: chatHistory,
          stream: true
        });

        let aiResponse = "";
        for await (const chunk of completion) {
          const content = chunk.choices[0]?.delta?.content || "";
          aiResponse += content;
          aiMessageDiv.innerText = aiResponse; // リアルタイムに文字を書き換え
          chatBox.scrollTop = chatBox.scrollHeight;
        }

        // AIの最終回答を履歴に保存
        chatHistory.push({ role: "assistant", content: aiResponse });

        // 会話履歴が長くなりすぎたら古いものを消す（軽量化対策）
        if (chatHistory.length > 8) {
          chatHistory.shift();
          chatHistory.shift();
        }

      } catch (error) {
        console.error(error);
        aiMessageDiv.innerText = "⚠️ エラーが発生しました。再試行してください。";
      } finally {
        // 入力枠を再有効化
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    // イベントリスナー設定
    sendBtn.addEventListener("click", handleSend);
    userInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") handleSend();
    });

    // 起動
    initAI();
  </script>
</body>
</html>
