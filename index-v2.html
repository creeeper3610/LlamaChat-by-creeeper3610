<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Llama-3.2 No-Cache Chat</title><script type="module">import * as webllm from "https://jsdelivr.net"; window.webllm = webllm;</script><style>:root {--bg-color: #0d0f12; --panel-color: #161a22; --accent-color: #00ffcc; --accent-glow: rgba(0, 255, 204, 0.3); --text-main: #e2e8f0; --text-muted: #718096; --chat-user: #1a2333; --chat-ai: #222936; --border-color: #2d3748;} * {box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif;} body {background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;} .container {width: 90vw; max-width: 800px; height: 85vh; background: var(--panel-color); border: 1px solid var(--border-color); border-radius: 16px; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 1px var(--accent-color);} header {padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;} h1 {font-size: 1.25rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;} h1 span {color: var(--accent-color); text-shadow: 0 0 8px var(--accent-glow);} .status-badge {font-size: 0.75rem; padding: 6px 12px; border-radius: 20px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-color); color: var(--text-muted); display: flex; align-items: center; gap: 8px;} .status-dot {width: 8px; height: 8px; border-radius: 50%; background: #ff4a4a;} .status-dot.ready {background: var(--accent-color); box-shadow: 0 0 8px var(--accent-color);} .progress-container {padding: 15px 20px; background: rgba(0, 0, 0, 0.3); border-bottom: 1px solid var(--border-color);} .progress-info {display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px; color: var(--text-main);} .progress-bar-bg {width: 100%; height: 8px; background: #090b0e; border-radius: 4px; overflow: hidden; border: 1px solid var(--border-color);} .progress-bar-fill {width: 0%; height: 100%; background: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); transition: width 0.1s linear;} .chat-box {flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;} .message {max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; word-break: break-all;} .message.user {align-self: flex-end; background: var(--chat-user); border-bottom-right-radius: 2px; border: 1px solid rgba(0, 255, 204, 0.1);} .message.ai {align-self: flex-start; background: var(--chat-ai); border-bottom-left-radius: 2px; border: 1px solid var(--border-color);} .message.system {align-self: center; background: transparent; color: var(--accent-color); font-size: 0.85rem; border: none; text-align: center; max-width: 100%;} .input-area {padding: 20px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; background: rgba(0, 0, 0, 0.1); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px;} input[type="text"] {flex: 1; background: #090b0e; border: 1px solid var(--border-color); color: var(--text-main); padding: 14px 20px; border-radius: 30px; font-size: 0.95rem; outline: none; transition: all 0.3s ease;} input[type="text"]:focus {border-color: var(--accent-color); box-shadow: 0 0 10px rgba(0, 255, 204, 0.15);} input[type="text"]:disabled {color: var(--text-muted); cursor: not-allowed;} button {background: var(--accent-color); color: #000; border: none; padding: 0 24px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 0 10px var(--accent-glow);} button:hover:not(:disabled) {background: #00e6b8; box-shadow: 0 0 15px var(--accent-color);} button:disabled {background: var(--border-color); color: var(--text-muted); box-shadow: none; cursor: not-allowed;}</style></head><body><div class="container"><header><h1>🤖 Local<span>Llama</span></h1><div class="status-badge"><div id="statusDot" class="status-dot"></div><span id="statusText">初期化中...</span></div></header><div class="progress-container" id="progressContainer"><div class="progress-info"><span id="progressText">ブラウザの検証中...</span><span id="progressPercent">0%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBarFill"></div></div></div><div class="chat-box" id="chatBox"></div><div class="input-area"><input type="text" id="userInput" placeholder="モデルの読込をお待ちください..." disabled><button id="sendBtn" disabled>送信</button></div></div><script type="module">const SELECTED_MODEL = "Llama-3.2-1B-Instruct-q4f16_1"; const ENGINE_CONFIG = { context_window_size: 1024 }; let engine = null; const chatHistory = []; const chatBox = document.getElementById("chatBox"); const progressContainer = document.getElementById("progressContainer"); const progressText = document.getElementById("progressText"); const progressPercent = document.getElementById("progressPercent"); const progressBarFill = document.getElementById("progressBarFill"); const userInput = document.getElementById("userInput"); const sendBtn = document.getElementById("sendBtn"); const statusDot = document.getElementById("statusDot"); const statusText = document.getElementById("statusText");
    function appendMessage(sender, text) {const msgDiv = document.createElement("div"); msgDiv.classList.add("message", sender); msgDiv.innerText = text; chatBox.appendChild(msgDiv); chatBox.scrollTop = chatBox.scrollHeight; return msgDiv;}
    async function clearWebLLMCache() {try {if ('caches' in window) {const keys = await caches.keys(); for (const key of keys) {if (key.includes("mlc") || key.includes("webllm")) {await caches.delete(key);}}}} catch (e) {console.warn(e);}}
    async function initAI() {if (!navigator.gpu) {progressText.innerText = "不可: WebGPU非対応です。"; progressText.style.color = "#ff4a4a"; return;} progressText.innerText = "前回のデータを破棄中..."; await clearWebLLMCache(); try {engine = await window.webllm.CreateEngine(SELECTED_MODEL, {appConfig: ENGINE_CONFIG, initProgressCallback: (report) => {progressText.innerText = report.text; const percent = Math.round(report.progress * 100); progressBarFill.style.width = `${percent}%`; progressPercent.innerText = `${percent}%`;}}); progressContainer.style.display = "none"; statusDot.classList.add("ready"); statusText.innerText = "オンライン (毎回ダウンロード)"; userInput.disabled = false; sendBtn.disabled = false; userInput.placeholder = "メッセージを入力..."; appendMessage("system", "Llama-3.2の新規ダウンロードと接続に成功しました！");} catch (error) {progressText.innerText = "エラー: ダウンロード失敗。"; progressText.style.color = "#ff4a4a";}}
    async function handleSend() {const text = userInput.value.trim(); if (!text || sendBtn.disabled) return; userInput.value = ""; userInput.disabled = true; sendBtn.disabled = true; appendMessage("user", text); chatHistory.push({ role: "user", content: text }); const aiMessageDiv = appendMessage("ai", "⚡ 思考中..."); try {const completion = await engine.chat.completions.create({messages: chatHistory, stream: true}); let aiResponse = ""; for await (const chunk of completion) {const content = chunk.choices?.delta?.content || ""; aiResponse += content; aiMessageDiv.innerText = aiResponse; chatBox.scrollTop = chatBox.scrollHeight;} chatHistory.push({ role: "assistant", content: aiResponse }); if (chatHistory.length > 8) {chatHistory.shift(); chatHistory.shift();}} catch (error) {aiMessageDiv.innerText = "⚠️ エラー。";} finally {userInput.disabled = false; sendBtn.disabled = false; userInput.focus();}}
    sendBtn.addEventListener("click", handleSend); userInput.addEventListener("keypress", (e) => {if (e.key === "Enter") handleSend();}); initAI();</script></body></html>
