<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Gemma 3 270M Chat (WASM)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Transformers.js -->
  <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js"></script>

  <style>
    /* SoratoさんのCSSをここに貼ってOK（省略） */
  </style>
</head>
<body>

  <header class="header">
    <div class="header-title">Gemma 3 270M Chat</div>
    <button id="downloadBtn" class="download-btn">モデルをダウンロード</button>
  </header>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <main id="chat" class="chat-container">
    <div class="message system">
      Gemma 3 270M をダウンロードすると会話できます。
    </div>
  </main>

  <div class="status-bar" id="status">モデル未ダウンロード</div>

  <div class="input-area">
    <textarea id="input" placeholder="メッセージを入力して Enter で送信"></textarea>
    <button id="sendBtn" disabled>送信</button>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const statusEl = document.getElementById("status");

    const downloadBtn = document.getElementById("downloadBtn");
    const progressContainer = document.getElementById("progressContainer");
    const progressBar = document.getElementById("progressBar");

    let pipeline = null;
    let modelReady = false;

    function appendMessage(role, content) {
      const div = document.createElement("div");
      div.classList.add("message", role);
      div.textContent = content;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    // ============================
    // モデルダウンロード（WASM）
    // ============================
    downloadBtn.addEventListener("click", async () => {
      downloadBtn.disabled = true;
      setStatus("モデルをダウンロード中…");
      progressContainer.style.display = "block";

      // Transformers.js の設定
      const { pipeline: loadPipeline } = window.transformers;

      pipeline = await loadPipeline(
        "text-generation",
        "https://huggingface.co/resolve/main/gemma3-270m-japanese-q4f32_1-ctx4k-webgpu.wasm",
        {
          progress_callback: (progress) => {
            const percent = Math.floor(progress * 100);
            progressBar.style.width = percent + "%";
          },
          dtype: "q4f32_1",
          device: "wasm"
        }
      );

      modelReady = true;
      progressContainer.style.display = "none";
      sendBtn.disabled = false;

      setStatus("モデル準備完了");
      appendMessage("system", "モデルの読み込みが完了しました。会話できます！");
    });

    // ============================
    // メッセージ送信
    // ============================
    async function sendMessage() {
      if (!modelReady) {
        appendMessage("assistant", "モデルがまだ読み込まれていません。");
        return;
      }

      const text = inputEl.value.trim();
      if (!text) return;

      appendMessage("user", text);
      inputEl.value = "";

      setStatus("Gemma 3 270M に送信中…");

      const output = await pipeline(text, {
        max_new_tokens: 200,
        temperature: 0.7
      });

      appendMessage("assistant", output[0].generated_text);
      setStatus("完了");
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
