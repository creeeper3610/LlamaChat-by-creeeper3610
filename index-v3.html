<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Gemma 3 270M Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ここに、あなたのCSSをそのまま貼り付けてOK -->
  <style>
    /* 例: クラス名だけ合わせておくので、好きに上書きしてね */

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      padding: 10px 16px;
      background: #222;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 600;
    }

    .model-badge {
      font-size: 0.8rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: #333;
      color: #9cf;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .message {
      max-width: 720px;
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      margin-left: auto;
      background: #2b4b7b;
    }

    .message.assistant {
      margin-right: auto;
      background: #333;
    }

    .message.system {
      margin: 0 auto 10px auto;
      font-size: 0.85rem;
      opacity: 0.8;
      background: transparent;
      border: 1px dashed #555;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #222;
      border-top: 1px solid #333;
      gap: 8px;
    }

    .input-area textarea {
      flex: 1;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #111;
      color: #eee;
      font-size: 0.95rem;
    }

    .input-area button {
      padding: 0 16px;
      border-radius: 6px;
      border: none;
      background: #4a8fff;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .input-area button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .status-bar {
      font-size: 0.8rem;
      padding: 4px 10px;
      background: #181818;
      border-top: 1px solid #222;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-title">Gemma 3 270M Chat</div>
      <div class="model-badge">Model: Gemma 3 270M</div>
    </header>

    <main id="chat" class="chat-container">
      <div class="message system">
        Gemma 3 270M と会話できます。質問や相談を入力してみてください。
      </div>
    </main>

    <div class="status-bar" id="status">準備完了</div>

    <div class="input-area">
      <textarea
        id="input"
        placeholder="メッセージを入力して Enter で送信（Shift+Enter で改行）"
      ></textarea>
      <button id="sendBtn">送信</button>
    </div>
  </div>

  <script>
    // ===== 設定部分 =====
    // ここを、あなたのバックエンドのエンドポイントに合わせて書き換えてね
    const API_ENDPOINT = "/api/chat"; // 例: ローカルのプロキシなど
    const MODEL_NAME = "gemma-3-270m"; // バックエンド側で使うモデル名

    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const statusEl = document.getElementById("status");

    let isSending = false;
    let messages = [
      {
        role: "system",
        content: "あなたはフレンドリーな日本語のAIアシスタントです。"
      }
    ];

    function appendMessage(role, content) {
      const div = document.createElement("div");
      div.classList.add("message", role);
      div.textContent = content;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isSending) return;

      isSending = true;
      sendBtn.disabled = true;
      setStatus("Gemma 3 270M に送信中…");

      // ユーザーメッセージを表示＆履歴に追加
      appendMessage("user", text);
      messages.push({ role: "user", content: text });
      inputEl.value = "";

      try {
        // バックエンドに送信するペイロード例
        const payload = {
          model: MODEL_NAME,
          messages: messages
        };

        const res = await fetch(API_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        // ここは、あなたのバックエンドのレスポンス形式に合わせて変更してね
        // 例: { reply: "..." } というJSONを返す想定
        const data = await res.json();
        const reply = data.reply || data.content || "(応答が空でした)";

        appendMessage("assistant", reply);
        messages.push({ role: "assistant", content: reply });
        setStatus("完了");
      } catch (err) {
        console.error(err);
        appendMessage("assistant", "エラーが発生しました: " + err.message);
        setStatus("エラーが発生しました");
      } finally {
        isSending = false;
        sendBtn.disabled = false;
      }
    }

    // ボタンで送信
    sendBtn.addEventListener("click", sendMessage);

    // Enter で送信 / Shift+Enter で改行
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
