<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Gemma 3 270M Chat (WebGPU)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- あなたのCSSをここに貼ってOK -->
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      padding: 10px 16px;
      background: #222;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .download-btn {
      padding: 6px 12px;
      background: #4a8fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      color: white;
      border: none;
    }

    .progress-container {
      width: 100%;
      background: #333;
      height: 8px;
      margin-top: 6px;
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: #4a8fff;
      transition: width 0.2s;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .message {
      max-width: 720px;
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    .message.user {
      margin-left: auto;
      background: #2b4b7b;
    }

    .message.assistant {
      margin-right: auto;
      background: #333;
    }

    .message.system {
      margin: 0 auto 10px auto;
      font-size: 0.85rem;
      opacity: 0.8;
      background: transparent;
      border: 1px dashed #555;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #222;
      border-top: 1px solid #333;
      gap: 8px;
    }

    .input-area textarea {
      flex: 1;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #111;
      color: #eee;
    }

    .input-area button {
      padding: 0 16px;
      border-radius: 6px;
      border: none;
      background: #4a8fff;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .input-area button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .status-bar {
      font-size: 0.8rem;
      padding: 4px 10px;
      background: #181818;
      border-top: 1px solid #222;
      color: #aaa;
    }
  </style>

  <!-- WebLLM CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm/dist/index.min.js"></script>
</head>
<body>

  <header class="header">
    <div class="header-title">Gemma 3 270M Chat</div>
    <button id="downloadBtn" class="download-btn">モデルをダウンロード</button>
  </header>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <main id="chat" class="chat-container">
    <div class="message system">
      Gemma 3 270M をダウンロードすると会話できます。
    </div>
  </main>

  <div class="status-bar" id="status">モデル未ダウンロード</div>

  <div class="input-area">
    <textarea id="input" placeholder="メッセージを入力して Enter で送信"></textarea>
    <button id="sendBtn" disabled>送信</button>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const statusEl = document.getElementById("status");

    const downloadBtn = document.getElementById("downloadBtn");
    const progressContainer = document.getElementById("progressContainer");
    const progressBar = document.getElementById("progressBar");

    let model = null;
    let modelReady = false;

    function appendMessage(role, content) {
      const div = document.createElement("div");
      div.classList.add("message", role);
      div.textContent = content;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    // ============================
    // モデルダウンロード
    // ============================
    downloadBtn.addEventListener("click", async () => {
      downloadBtn.disabled = true;
      setStatus("モデルをダウンロード中…");
      progressContainer.style.display = "block";

      model = new webllm.ChatModule();

      await model.reload("gemma-2-2b-it-q4f16_1", {
        onProgress: (progress) => {
          const percent = Math.floor(progress * 100);
          progressBar.style.width = percent + "%";
        }
      });

      modelReady = true;
      progressContainer.style.display = "none";
      sendBtn.disabled = false;
      setStatus("モデル準備完了");
      appendMessage("system", "モデルの読み込みが完了しました。会話できます！");
    });

    // ============================
    // メッセージ送信
    // ============================
    async function sendMessage() {
      if (!modelReady) {
        appendMessage("assistant", "モデルがまだ読み込まれていません。");
        return;
      }

      const text = inputEl.value.trim();
      if (!text) return;

      appendMessage("user", text);
      inputEl.value = "";

      setStatus("Gemma 3 270M に送信中…");

      const reply = await model.generate(text);
      appendMessage("assistant", reply);

      setStatus("完了");
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
